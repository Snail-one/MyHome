<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航登录</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="logged-out">
    <div class="auth-screen" id="auth-screen" aria-hidden="false">
        <form class="auth-card" id="login-form">
            <div class="auth-card-header">
                <h1>个人导航登录</h1>
                <p>请登录后使用</p>
            </div>
            <div class="auth-form-group">
                <label for="login-username">账号</label>
                <input type="text" id="login-username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="auth-form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" name="password" autocomplete="current-password" required>
            </div>
            <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>
            <button type="submit" class="btn btn-primary auth-submit">登录</button>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
