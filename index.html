<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ✅ Content Security Policy 防止 XSS 攻击 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' http: https: data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:">
    <title>个人导航首页</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-pending">
    <div class="auth-screen" id="auth-screen" aria-hidden="true">
        <form class="auth-card" id="login-form">
            <div class="auth-card-header">
                <h1>个人导航登录</h1>
                <p>请登录后使用</p>
            </div>
            <div class="auth-form-group">
                <label for="login-username">账号</label>
                <input type="text" id="login-username" name="username" autocomplete="username" required>
            </div>
            <div class="auth-form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" name="password" autocomplete="current-password" required>
            </div>
            <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>
            <button type="submit" class="btn btn-primary auth-submit">登录</button>
        </form>
    </div>

    <div class="corner-controls corner-email email-links-panel" id="email-links-container" aria-label="邮箱链接">
    </div>

    <div class="corner-controls corner-logout" aria-label="退出登录">
        <button type="button" class="corner-btn logout-btn" id="logout-btn" title="退出登录">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span class="corner-btn-label">退出</span>
        </button>
    </div>

    <div class="corner-controls corner-right" aria-label="设置">
        <button type="button" class="corner-btn edit-mode-btn" id="edit-mode-btn" title="开启/关闭编辑模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span class="corner-btn-label">编辑模式</span>
        </button>
        <button type="button" class="corner-btn icon-refresh-btn" id="icon-refresh-btn" title="刷新图标缓存">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
            <span class="corner-btn-label">刷新图标</span>
        </button>
        <button type="button" class="corner-btn manage-menu-btn" title="管理布局和搜索引擎">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
            <span class="corner-btn-label">管理菜单</span>
        </button>
        <button type="button" class="corner-btn background-btn" title="自定义背景">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span class="corner-btn-label">背景</span>
        </button>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 搜索引擎切换区 -->
        <div class="search-engine-switcher">
        </div>

        <!-- 搜索框区域 -->
        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="搜索互联网..." 
                    autocomplete="off"
                    autofocus
                >
                <button class="search-engine-indicator" title="点击搜索">
                    <span class="current-engine">Google</span>
                    <svg class="search-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
        </div>

        <section class="project-links-section" id="project-links-section" hidden>
            <div class="navigation-links project-links" id="project-links-container">
                <div class="nav-empty-state" id="project-empty-state">
                    <p>暂无项目，开启编辑模式后点击 + 添加</p>
                </div>
            </div>
        </section>

        <!-- 导航链接区（由 JS 根据存储的菜单数据动态渲染，图标来自网页 favicon） -->
        <div class="navigation-links" id="nav-links-container">
            <!-- 空状态提示，无链接时显示 -->
            <div class="nav-empty-state" id="nav-empty-state">
                <p>暂无链接，开启编辑模式后点击 + 添加</p>
            </div>
        </div>

        <!-- 页脚（可选） -->
        <footer class="footer">
            <p>蜗牛个人首页 · 2026-01-25</p>
        </footer>
    </div>

    <!-- 自定义背景弹窗 -->
    <div class="modal-overlay" id="background-modal" aria-hidden="true">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2 class="modal-title">自定义背景</h2>
                <button type="button" class="modal-close" data-close="background-modal" title="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <div class="background-section">
                    <div class="file-upload-wrapper">
                        <input type="file" id="background-upload" accept="image/*" class="file-input">
                        <label for="background-upload" class="file-upload-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span class="file-upload-text">选择图片</span>
                        </label>
                        <div class="file-preview" id="background-preview" style="display: none;">
                            <img id="background-preview-img" alt="预览">
                            <button type="button" class="file-preview-remove" id="background-preview-remove" title="移除">×</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="background-url">或输入图片地址</label>
                        <input type="text" id="background-url" placeholder="https://example.com/image.jpg" class="full-width">
                    </div>
                    <p class="form-hint">上传本地图片会保存为服务器文件；数据库只保存图片路径或链接。</p>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" id="background-apply">应用</button>
                        <button type="button" class="btn btn-secondary" id="background-reset">恢复默认</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑网址弹窗 -->
    <div class="modal-overlay" id="link-modal" aria-hidden="true">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2 class="modal-title" id="link-modal-title">添加网址</h2>
                <button type="button" class="modal-close" data-close="link-modal" title="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <form class="link-form" id="link-form">
                    <div class="form-group">
                        <label for="link-title">显示名称</label>
                        <input type="text" id="link-title" name="title" placeholder="例如：GitHub" required>
                    </div>
                    <div class="form-group">
                        <label for="link-url" id="link-url-label">链接地址</label>
                        <input type="url" id="link-url" name="url" placeholder="https://example.com" required>
                    </div>
                    <p class="form-hint" id="link-form-hint">图标将根据网址自动获取网页 favicon。</p>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="link-form-submit">添加链接</button>
                        <button type="button" class="btn btn-secondary" id="link-form-cancel">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 管理菜单弹窗 -->
    <div class="modal-overlay" id="manage-modal" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">布局与搜索引擎</h2>
                <button type="button" class="modal-close" data-close="manage-modal" title="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <div class="layout-settings-section">
                    <h3>布局设置</h3>
                    <div class="layout-options">
                        <label class="layout-option-label">个人项目每行数量：</label>
                        <div class="layout-buttons" id="project-layout-buttons"></div>
                        <p class="form-hint" id="project-layout-options-hint">根据当前窗口显示可用列数</p>
                    </div>
                    <div class="layout-options">
                        <label class="layout-option-label">个人书签每行数量：</label>
                        <div class="layout-buttons" id="layout-buttons"></div>
                        <p class="form-hint" id="layout-options-hint">根据当前窗口显示可用列数</p>
                    </div>
                    <div class="layout-options">
                        <label class="layout-option-label">个人项目显示：</label>
                        <div class="layout-buttons" id="project-display-mode-buttons"></div>
                    </div>
                    <div class="layout-options">
                        <label class="layout-option-label">个人书签显示：</label>
                        <div class="layout-buttons" id="bookmark-display-mode-buttons"></div>
                    </div>
                    <div class="layout-options">
                        <label class="layout-option-label">个人项目大小：</label>
                        <div class="layout-buttons" id="project-link-size-buttons"></div>
                    </div>
                    <div class="layout-options">
                        <label class="layout-option-label">个人书签大小：</label>
                        <div class="layout-buttons" id="bookmark-link-size-buttons"></div>
                    </div>
                </div>
                <div class="search-engine-settings-section">
                    <h3>搜索引擎</h3>
                    <form class="search-engine-form" id="search-engine-form">
                        <div class="form-group">
                            <label for="engine-name">显示名称</label>
                            <input type="text" id="engine-name" name="name" placeholder="例如：知乎" required>
                        </div>
                        <div class="form-group">
                            <label for="engine-url-template">搜索地址</label>
                            <input type="text" id="engine-url-template" name="urlTemplate" placeholder="https://www.zhihu.com/search?q={query}" required>
                        </div>
                        <p class="form-hint">使用 {query} 作为关键词位置。</p>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="search-engine-submit">添加搜索引擎</button>
                            <button type="button" class="btn btn-secondary" id="search-engine-form-cancel" hidden>取消</button>
                        </div>
                    </form>
                    <div class="engine-list" id="search-engine-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
